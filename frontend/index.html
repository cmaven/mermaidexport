<!-- index.html: Mermaid Web Converter 단일 페이지 애플리케이션 | 생성일: 2026-04-07 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mermaid 다이어그램 변환기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <div class="loading-box">
      <div class="spinner" role="status" aria-label="변환 중"></div>
      <p class="loading-text">변환 중...</p>
    </div>
  </div>

  <!-- 헤더 -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="40" height="40" rx="10" fill="#3b82f6"/>
            <rect x="8" y="12" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
            <rect x="22" y="8" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
            <rect x="22" y="22" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
            <line x1="18" y1="17" x2="22" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="18" y1="17" x2="22" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="logo-text">
            <h1>Mermaid 다이어그램 변환기</h1>
            <span class="logo-sub">MD 파일에서 다이어그램을 추출하고 다양한 형식으로 변환</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main class="main">
    <div class="container">

      <!-- 업로드 영역 -->
      <section class="upload-section" aria-labelledby="upload-title">
        <div
          class="drop-zone"
          id="dropZone"
          role="button"
          tabindex="0"
          aria-label="MD 파일 업로드 영역. 파일을 드래그하거나 클릭하여 선택하세요."
        >
          <div class="drop-zone-content">
            <div class="drop-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M32 44V20M32 20L22 30M32 20L42 30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16 48h32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <rect x="8" y="8" width="48" height="48" rx="8" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
              </svg>
            </div>
            <p class="drop-primary">MD 파일을 드래그하거나 클릭하여 업로드</p>
            <p class="drop-secondary">Markdown (.md) 파일 지원 · Mermaid 블록 자동 추출</p>
            <button class="btn-pick" id="btnPick" type="button" aria-label="파일 선택 창 열기">
              파일 선택
            </button>
          </div>
          <input
            type="file"
            id="fileInput"
            accept=".md,text/markdown"
            class="file-input-hidden"
            aria-hidden="true"
            tabindex="-1"
          />
        </div>

        <!-- 에러 메시지 -->
        <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive" hidden>
          <svg class="error-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          <span id="errorMessage"></span>
        </div>
      </section>

      <!-- 결과 영역 (초기 hidden) -->
      <section class="results-section" id="resultsSection" aria-labelledby="results-title" hidden>
        <div class="results-header">
          <div class="results-title-group">
            <h2 id="results-title" class="results-title">변환 결과</h2>
            <span class="results-count" id="resultsCount"></span>
          </div>
          <div class="results-actions">
            <button class="btn-zip" id="btnDownloadAll" type="button">
              <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
              </svg>
              전체 ZIP 다운로드
            </button>
            <button class="btn-combined-pptx" id="btnCombinedPptx" type="button" hidden>
              <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
              </svg>
              전체 PPTX 다운로드
            </button>
          </div>
        </div>

        <!-- 다이어그램 카드 목록 -->
        <div class="diagram-grid" id="diagramGrid" role="list"></div>
      </section>

    </div>
  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="container">
      <p>Mermaid Web Converter &mdash; Mermaid 다이어그램을 PNG, Draw.io, Excalidraw, PPTX로 변환</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
